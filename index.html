<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير تسليم الخزينة - طباعة حرارية</title>

<style>
body{font-family:Tahoma;background:#eef2f7;margin:0;padding:0;text-align:center;}
.container{max-width:1400px;margin:auto;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;text-align:center;}
select,input,button{padding:6px;margin:2px;text-align:center;}

table{width:100%;border-collapse:collapse;margin-top:5px;}
th,td{text-align:center;padding:4px;font-size:14px;}

.headerBox{text-align:center;margin-bottom:5px;}
.logo{width:60px;display:block;margin:auto;}
.branchName{font-weight:bold;margin-top:5px;font-size:16px;}

.printBtn{
background:#e67e22;color:#fff;border:none;padding:10px;margin-top:10px;width:100%;
cursor:pointer;font-size:20px;
}

.diffPositive{color:green;font-weight:bold;}
.diffNegative{color:red;font-weight:bold;}

.footerBox{display:flex;justify-content:center;gap:50px;margin-top:5px;font-weight:bold;font-size:14px;}

.detailsTable th, .detailsTable td{border:1px solid #000;padding:4px;font-size:13px;}

.infoTable{width:60%;margin:auto;margin-bottom:5px;}
.infoTable th, .infoTable td{padding:3px;font-size:20px;}

@media print {
body{width:80mm;margin:0;padding:0;}
.printBtn{display:none;}
}
</style>
</head>

<body>
<div class="container">

<h3>📊 تقرير تسليم الخزينة</h3>

<div class="card">
<select id="branchSelect"></select>
<input type="date" id="dateSelect">
<input type="number" id="drawerSearch" placeholder="رقم الدرج">
<button onclick="loadTreasury()">عرض</button>
</div>

<div id="summaryBox" class="card"></div>

<div class="card">
<table>
<thead>
<tr>
<th>الدرج</th><th>التاريخ</th><th>اليوم</th><th>الفرع</th><th>الإجمالي</th>
</tr>
</thead>
<tbody id="treasuryTable"></tbody>
</table>
</div>

<div id="detailsContainer" class="card" style="display:none;">
<div id="details"></div>
<button class="printBtn" onclick="printReceipt()">🖨 طباعة الرسيت</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
databaseURL:"https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let current=null;
const sum=(arr)=> (arr||[]).reduce((a,b)=>a+Number(b.amount||0),0);

// الفروع
db.ref("branches").once("value").then(snap=>{
snap.forEach(b=>{
branchSelect.innerHTML+=`<option value="${b.key}">${b.val().name}</option>`;
});
});

// فلترة + إجماليات
function loadTreasury(){
treasuryTable.innerHTML="";
summaryBox.innerHTML="";

let selectedDate = dateSelect.value;
let drawerVal = drawerSearch.value;

db.ref("treasury").once("value").then(snap=>{

let cashTotal=0, instaTotal=0, walletTotal=0, visaTotal=0;
let instaCount=0, walletCount=0, visaCount=0;

snap.forEach(s=>{
let t=s.val();

if(selectedDate && t.date !== selectedDate) return;
if(drawerVal && t.drawer != drawerVal) return;

let tr=document.createElement("tr");
tr.innerHTML=`<td>${t.drawer}</td><td>${t.date}</td><td>${t.day}</td><td>${t.branchName}</td><td>${t.total}</td>`;
tr.onclick=()=>{current=t;showDetails(t);}
treasuryTable.appendChild(tr);

cashTotal += Number(t.cash||0);
instaTotal += sum(t.insta);
instaCount += (t.insta||[]).length;
walletTotal += sum(t.wallet);
walletCount += (t.wallet||[]).length;
visaTotal += sum(t.visa);
visaCount += (t.visa||[]).length;
});

summaryBox.innerHTML=`
<table class="detailsTable">
<tr>
<th>نقدي</th>
<th>انستا</th><th>عدد</th>
<th>محفظة</th><th>عدد</th>
<th>فيزا</th><th>عدد</th>
<th>الإجمالي العام</th>
</tr>

<tr>
<td>${cashTotal}</td>
<td>${instaTotal}</td><td>${instaCount}</td>
<td>${walletTotal}</td><td>${walletCount}</td>
<td>${visaTotal}</td><td>${visaCount}</td>
<td>${cashTotal + instaTotal + walletTotal}</td>
</tr>
</table>
`;
});
}

// عرض التفاصيل (زي ما كان)
function showDetails(t){
detailsContainer.style.display="block";

function tableHtml(title, arr, type){
if(!arr || arr.length==0) return "";
let h=`<h4>${title}</h4><table class="detailsTable"><tr>`;
if(type=="insta"||type=="wallet"){h+=`<th>المبلغ</th><th>الرقم</th><th>الاسم</th>`;}
if(type=="visa"){h+=`<th>المبلغ</th><th>الترحيلة</th>`;}
if(type=="exp"){h+=`<th>المبلغ</th><th>السبب</th><th>المسؤول</th>`;}
h+=`</tr>`;
arr.forEach(i=>{
h+=`<tr>`;
if(type=="insta"||type=="wallet"){h+=`<td>${i.amount}</td><td>${i.mobile||""}</td><td>${i.name||""}</td>`;}
if(type=="visa"){h+=`<td>${i.amount}</td><td>${i.ref||""}</td>`;}
if(type=="exp"){h+=`<td>${i.amount}</td><td>${i.note||""}</td><td>${i.user||i.employee||""}</td>`;}
h+=`</tr>`;});
h+=`</table><b>الإجمالي: ${sum(arr)}</b><br>`;
return h;
}

let diffClass=t.diff<0?"diffNegative":"diffPositive";

let html=`
<div class="headerBox">
<div class="branchName">فرع: ${t.branchName}</div>
</div>

<table class="infoTable">
<tr><th>اليوم</th><th>التاريخ</th><th>رقم الدرج</th></tr>
<tr><td>${t.day}</td><td>${t.date}</td><td>${t.drawer}</td></tr>
</table>

<table class="detailsTable">
<tr><th>الحركة</th><th>القيمة</th></tr>
<tr><td>نقدي</td><td>${t.cash||0}</td></tr>
<tr><td>انستا</td><td>${sum(t.insta)}</td></tr>
<tr><td>محفظة</td><td>${sum(t.wallet)}</td></tr>
<tr><td>فيزا</td><td>${sum(t.visa)}</td></tr>
<tr><td>فعلي</td><td>${t.actual||0}</td></tr>
<tr><td>الإجمالي</td><td>${t.total||0}</td></tr>
<tr><td>الفرق</td><td class="${diffClass}">${t.diff||0}</td></tr>
</table>
`;

html+=tableHtml("انستا",t.insta,"insta");
html+=tableHtml("محفظة",t.wallet,"wallet");
html+=tableHtml("فيزا",t.visa,"visa");
html+=tableHtml("مشتريات",t.purchases,"exp");
html+=tableHtml("مصروفات",t.expenses,"exp");

html+=`<div class="footerBox"><div>المسؤول: ${t.drawerManager||""}</div><div>المراجع: ${t.reviewer||""}</div></div>`;

document.getElementById("details").innerHTML=html;
}

// ✅ الطباعة (التعديل فقط هنا)
function printReceipt(){
if(!current) return alert("اختر شفت");

function tablePrint(title, arr, type){
if(!arr || arr.length==0) return "";

let t=`<table style="width:100%;border:1px solid #000;border-collapse:collapse;text-align:center;font-size:15px;margin-top:10px">`;
t+=`<tr><th colspan="3">${title}</th></tr>`;

if(type=="insta"||type=="wallet"){t+=`<tr><th>المبلغ</th><th>رقم</th><th>اسم</th></tr>`;}
if(type=="visa"){t+=`<tr><th>المبلغ</th><th>ترحيلة</th></tr>`;}
if(type=="exp"){t+=`<tr><th>المبلغ</th><th>سبب</th><th>مسؤول</th></tr>`;}

arr.forEach(i=>{
t+=`<tr>`;
if(type=="insta"||type=="wallet"){t+=`<td>${i.amount}</td><td>${i.mobile||""}</td><td>${i.name||""}</td>`;}
if(type=="visa"){t+=`<td>${i.amount}</td><td>${i.ref||""}</td>`;}
if(type=="exp"){t+=`<td>${i.amount}</td><td>${i.note||""}</td><td>${i.user||i.employee||""}</td>`;}
t+=`</tr>`;
});

t+=`<tr><td colspan="3"><b>الإجمالي: ${sum(arr)}</b></td></tr></table>`;
return t;
}

let html=`
<body style="font-family:monospace;width:80mm;padding:18px;text-align:center">

<table style="width:100%;border:1px solid #000;border-collapse:collapse;text-align:center">
<tr><th colspan="3">الفرع</th></tr>
<tr><td colspan="3">${current.branchName}</td></tr>
</table>

<table style="width:100%;border:1px solid #000;border-collapse:collapse;text-align:center;margin-top:5px">
<tr><th>اليوم</th><th>التاريخ</th><th>رقم الدرج</th></tr>
<tr><td>${current.day}</td><td>${current.date}</td><td>${current.drawer}</td></tr>
</table>

<table style="width:100%;border:1px solid #000;border-collapse:collapse;text-align:center;font-size:15px;margin-top:24px">
<tr><th>الحركة</th><th>القيمة</th></tr>
<tr><td>نقدي</td><td>${current.cash||0}</td></tr>
<tr><td>انستا</td><td>${sum(current.insta)}</td></tr>
<tr><td>محفظة</td><td>${sum(current.wallet)}</td></tr>
<tr><td>فيزا</td><td>${sum(current.visa)}</td></tr>
<tr><td>فعلي</td><td>${current.actual||0}</td></tr>
<tr><td>الإجمالي</td><td>${current.total||0}</td></tr>
<tr><td>الفرق</td><td>${current.diff||0}</td></tr>
</table>

${tablePrint("انستا",current.insta,"insta")}
${tablePrint("محفظة",current.wallet,"wallet")}
${tablePrint("فيزا",current.visa,"visa")}
${tablePrint("مشتريات",current.purchases,"exp")}
${tablePrint("مصروفات",current.expenses,"exp")}

<table style="width:100%;border:1px solid #000;border-collapse:collapse;text-align:center;margin-top:7px">
<tr><th>مسؤول الدرج</th><th>المراجع</th></tr>
<tr><td>${current.drawerManager||""}</td><td>${current.reviewer||""}</td></tr>
</table>

</body>
`;

let w=window.open("");
w.document.write(html);
w.document.close();
w.print();
}
</script>

</body>
</html>
