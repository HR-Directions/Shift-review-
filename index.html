<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الخزينة v5.1 - الاحترافي المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        
        #thermalArea {
            display: none;
            width: 80mm;
            background: white;
            padding: 0;
            margin: 0;
            color: black;
        }

        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            border: 1.5px solid #000;
        }
        .receipt-table th, .receipt-table td {
            border: 1.5px solid #000;
            padding: 4px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
        }
        .header-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto 10px;
        }
        .header-branch {
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            border-bottom: 2px solid #000;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }

        @media print {
            @page { size: 80mm auto; margin: 0; }
            body * { visibility: hidden; }
            #thermalArea, #thermalArea * { visibility: visible; }
            #thermalArea {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                padding: 4mm;
            }
        }

        .checkbox-custom { width: 22px; height: 22px; cursor: pointer; accent-color: #2563eb; }
        .floating-actions { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50; }
        .selected-row { background-color: #eff6ff !important; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="p-4 md:p-6 pb-32">

    <div class="max-w-7xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800">مراجعة الخزينة المركزية</h1>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">إصدار التقارير المجمعة v5.1</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-all">
                🔄 تحديث البيانات
            </button>
        </header>

        <!-- الإحصائيات الشاملة -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-blue-600">
                <span class="text-slate-400 text-xs font-black uppercase">إجمالي النقدي (كاش)</span>
                <h2 id="stCash" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-emerald-500">
                <span class="text-slate-400 text-xs font-black uppercase">انستا باي (عمليات)</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stInsta" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="stInstaCount" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs">0</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-orange-500">
                <span class="text-slate-400 text-xs font-black uppercase">الفيزا (عمليات)</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stVisa" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="stVisaCount" class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs">0</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-r-8 border-purple-500">
                <span class="text-slate-400 text-xs font-black uppercase">المحافظ (عمليات)</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stWallet" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="stWalletCount" class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs">0</span>
                </div>
            </div>
        </div>

        <!-- فلاتر البحث المتقدمة -->
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 flex flex-wrap gap-4 items-end border border-slate-100">
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-black text-slate-500 mb-1">تصفية بالفرع</label>
                <select id="fBranch" class="w-full bg-slate-50 border-2 border-slate-100 p-2.5 rounded-2xl outline-none font-bold focus:border-blue-500">
                    <option value="">جميع الفروع</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-black text-slate-500 mb-1">تاريخ اليوم</label>
                <input type="date" id="fDate" class="w-full bg-slate-50 border-2 border-slate-100 p-2.5 rounded-2xl outline-none font-bold focus:border-blue-500">
            </div>
            <div class="flex-1 min-w-[100px]">
                <label class="block text-xs font-black text-slate-500 mb-1">رقم الدرج</label>
                <input type="number" id="fDrawer" placeholder="رقم" class="w-full bg-slate-50 border-2 border-slate-100 p-2.5 rounded-2xl outline-none font-bold focus:border-blue-500">
            </div>
            <button onclick="fetchData()" class="bg-slate-900 text-white px-10 py-3.5 rounded-2xl font-black hover:bg-black transition-all shadow-xl">بحث وتصفية</button>
        </div>

        <!-- الجدول الرئيسي -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-100 mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="p-5 text-center"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" class="checkbox-custom"></th>
                            <th class="p-5">رقم الدرج</th>
                            <th class="p-5">اسم الفرع</th>
                            <th class="p-5">التاريخ</th>
                            <th class="p-5 text-blue-600">إجمالي نقدي</th>
                            <th class="p-5">إجمالي حساب</th>
                            <th class="p-5">الفرق</th>
                            <th class="p-5 text-center">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="mainTableBody" class="divide-y divide-slate-50 font-bold text-slate-700">
                        <!-- rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- قسم عرض التفاصيل عند النقر -->
        <div id="detailsPanel" class="hidden bg-white p-8 rounded-3xl shadow-xl border-2 border-blue-100 mb-10 transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-blue-900">تفاصيل السجل المالي</h3>
                <button onclick="closeDetails()" class="text-slate-400 hover:text-red-500 font-bold text-xl">✖</button>
            </div>
            <div id="detailsContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- sub-tables -->
            </div>
        </div>
    </div>

    <!-- أزرار العمليات المجمعة -->
    <div id="bulkActions" class="hidden floating-actions bg-slate-900 text-white p-4 rounded-3xl shadow-2xl flex items-center gap-6 border border-slate-700">
        <span id="selectedCount" class="text-sm font-black text-blue-400 px-4">تم تحديد 0 ورديات</span>
        <div class="flex gap-2">
            <button onclick="generateDailyReport('print')" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-black hover:bg-blue-500">🖨️ طباعة تقرير مجمع</button>
            <button onclick="generateDailyReport('whatsapp')" class="bg-emerald-600 px-6 py-2 rounded-xl text-xs font-black hover:bg-emerald-500">📱 إرسال واتساب</button>
        </div>
    </div>

    <!-- منطقة الطباعة المخفية -->
    <div id="thermalArea"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logoUrl = "https://lh3.googleusercontent.com/pw/AP1GczOHV-3gVfsqN_Y3nGe3v3khgZh8jnMiyzrIg6KECReqrTpnHFK4Adt-_QMyqjcqzy4a2XuXO-sHdgygcqRXcBg0jRmhi4K82oIia841B8vVLescBEqAtn2sZrGf5UO8AqKouvByzQKvoXET4XtjA7-t=w2499-h2499-s-no-gm?authuser=0";

    let fetchedRecords = [];

    window.onload = () => { loadBranches(); fetchData(); };

    function loadBranches() {
        db.ref("branches").once("value", s => {
            const sel = document.getElementById("fBranch");
            s.forEach(c => sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`);
        });
    }

    function sum(arr) {
        if(!arr || !Array.isArray(arr)) return 0;
        return arr.reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
    }

    function countOperations(arr, isVisa = false) {
        if(!arr || !Array.isArray(arr)) return 0;
        if(isVisa) return arr.reduce((acc, curr) => acc + (parseInt(curr.count) || 0), 0);
        return arr.length;
    }

    function fetchData() {
        const body = document.getElementById("mainTableBody");
        const bF = document.getElementById("fBranch").value;
        const dF = document.getElementById("fDate").value;
        const rF = document.getElementById("fDrawer").value;

        body.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-slate-300 font-bold">جاري تحديث البيانات...</td></tr>`;

        db.ref("treasury").once("value", s => {
            body.innerHTML = "";
            fetchedRecords = [];
            s.forEach(c => {
                const item = c.val();
                item.key = c.key;
                if (bF && item.branchKey !== bF) return;
                if (dF && item.date !== dF) return;
                if (rF && item.drawer != rF) return;
                fetchedRecords.push(item);
            });

            fetchedRecords.sort((x, y) => y.timestamp - x.timestamp);

            let tCash=0, tInsta=0, cInsta=0, tWallet=0, cWallet=0, tVisa=0, cVisa=0;

            fetchedRecords.forEach(item => {
                const iSum = sum(item.insta); const iCnt = countOperations(item.insta);
                const wSum = sum(item.wallet); const wCnt = countOperations(item.wallet);
                const vSum = sum(item.visa); const vCnt = countOperations(item.visa, true);

                tCash += (+item.cash||0);
                tInsta += iSum; cInsta += iCnt;
                tWallet += wSum; cWallet += wCnt;
                tVisa += vSum; cVisa += vCnt;

                const tr = document.createElement("tr");
                tr.className = "hover:bg-blue-50 transition-all cursor-pointer group";
                tr.onclick = (e) => {
                    if(!e.target.classList.contains('row-check') && e.target.tagName !== 'BUTTON') showDetails(item, tr);
                };
                tr.innerHTML = `
                    <td class="p-5 text-center"><input type="checkbox" value="${item.key}" onchange="updateSelectedCount()" class="row-check checkbox-custom"></td>
                    <td class="p-5">#${item.drawer}</td>
                    <td class="p-5 text-slate-400">${item.branchName}</td>
                    <td class="p-5 text-[11px] text-slate-400">${item.date}</td>
                    <td class="p-5 text-blue-600">${item.cash}</td>
                    <td class="p-5">${item.total}</td>
                    <td class="p-5 ${+item.diff < 0 ? 'text-red-500' : 'text-green-500'}">${item.diff}</td>
                    <td class="p-5 text-center">
                        <button onclick='printSingle(${JSON.stringify(item)})' class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-xl text-xs font-black hover:bg-blue-600 hover:text-white transition-all">طبع</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            document.getElementById("stCash").innerText = tCash.toLocaleString();
            document.getElementById("stInsta").innerText = tInsta.toLocaleString();
            document.getElementById("stInstaCount").innerText = cInsta;
            document.getElementById("stWallet").innerText = tWallet.toLocaleString();
            document.getElementById("stWalletCount").innerText = cWallet;
            document.getElementById("stVisa").innerText = tVisa.toLocaleString();
            document.getElementById("stVisaCount").innerText = cVisa;
        });
    }

    function showDetails(item, rowElement) {
        const panel = document.getElementById("detailsPanel");
        const content = document.getElementById("detailsContent");
        document.querySelectorAll("#mainTableBody tr").forEach(tr => tr.classList.remove('selected-row'));
        rowElement.classList.add('selected-row');
        panel.classList.remove("hidden");
        content.innerHTML = `
            ${renderSubTableHTML("الفيزا والباتشات", item.visa, 'v')}
            ${renderSubTableHTML("انستا باي", item.insta, 't')}
            ${renderSubTableHTML("المحافظ الإلكترونية", item.wallet, 't')}
            ${renderSubTableHTML("المصروفات", item.expenses, 'e')}
            ${renderSubTableHTML("المشتريات", item.purchases, 'e')}
        `;
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeDetails() {
        document.getElementById("detailsPanel").classList.add("hidden");
        document.querySelectorAll("#mainTableBody tr").forEach(tr => tr.classList.remove('selected-row'));
    }

    function renderSubTableHTML(title, arr, mode) {
        if(!arr || arr.length === 0) return `<div class="bg-slate-50 p-4 rounded-2xl text-center text-slate-400 font-bold">${title}: لا يوجد</div>`;
        let h = `<div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
            <div class="bg-slate-800 text-white p-3 text-xs font-black text-center">${title}</div>
            <table class="w-full text-[11px] text-right">
                <thead><tr class="bg-slate-50 border-b">`;
        if(mode==='v') h += `<th class="p-2">باتش</th><th class="p-2">مبلغ</th><th class="p-2">عدد</th>`;
        else if(mode==='t') h += `<th class="p-2">مبلغ</th><th class="p-2">رقم</th>`;
        else h += `<th class="p-2">مبلغ</th><th class="p-2">بيان</th>`;
        h += `</tr></thead><tbody>`;
        arr.forEach(x => {
            h += `<tr class="border-b">`;
            if(mode==='v') h += `<td class="p-2">${x.batch}</td><td class="p-2">${x.amount}</td><td class="p-2">${x.count}</td>`;
            else if(mode==='t') h += `<td class="p-2">${x.amount}</td><td class="p-2 text-slate-400">${x.mobile||''}</td>`;
            else h += `<td class="p-2">${x.amount}</td><td class="p-2">${x.note||''}</td>`;
            h += `</tr>`;
        });
        h += `<tr class="bg-blue-50 font-black"><td colspan="${mode==='v'?'2':'1'}" class="p-2">إجمالي</td><td class="p-2">${sum(arr)}</td></tr></tbody></table></div>`;
        return h;
    }

    function toggleSelectAll(master) {
        document.querySelectorAll(".row-check").forEach(c => c.checked = master.checked);
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const count = document.querySelectorAll(".row-check:checked").length;
        const bulk = document.getElementById("bulkActions");
        const countLabel = document.getElementById("selectedCount");
        if(count > 0) { bulk.classList.remove("hidden"); countLabel.innerText = `تم تحديد ${count} ورديات`; }
        else { bulk.classList.add("hidden"); }
    }

    function generateDailyReport(type) {
        const selectedKeys = Array.from(document.querySelectorAll(".row-check:checked")).map(c => c.value);
        const selectedData = fetchedRecords.filter(r => selectedKeys.includes(r.key));
        if(selectedData.length === 0) return;

        let agg = {
            cash: 0, actual: 0, total: 0, diff: 0,
            insta: [], wallet: [], visa: [], purchases: [], expenses: [],
            branchNames: new Set(), date: selectedData[0].date
        };

        selectedData.forEach(d => {
            agg.cash += (+d.cash||0); agg.actual += (+d.actual||0);
            agg.total += (+d.total||0); agg.diff += (+d.diff||0);
            if(d.insta) agg.insta.push(...d.insta);
            if(d.wallet) agg.wallet.push(...d.wallet);
            if(d.visa) agg.visa.push(...d.visa);
            if(d.purchases) agg.purchases.push(...d.purchases);
            if(d.expenses) agg.expenses.push(...d.expenses);
            agg.branchNames.add(d.branchName);
        });

        if(type === 'print') printThermal(agg, true);
        else sendToWhatsapp(agg);
    }

    function sendToWhatsapp(data) {
        let text = `📦 *تقرير مبيعات مجمع (v5.1)*\n`;
        text += `📅 التاريخ: ${data.date}\n`;
        text += `🏢 الفروع: ${Array.from(data.branchNames).join(" - ")}\n`;
        text += `--------------------------\n`;
        text += `💰 كاش: ${data.cash}\n`;
        text += `💳 فيزا: ${sum(data.visa)} (ع: ${countOperations(data.visa, true)})\n`;
        text += `📱 انستا: ${sum(data.insta)} (ع: ${countOperations(data.insta)})\n`;
        text += `👛 محافظ: ${sum(data.wallet)} (ع: ${countOperations(data.wallet)})\n`;
        text += `--------------------------\n`;
        text += `✅ الفعلي: ${data.actual}\n`;
        text += `📊 الإجمالي: ${data.total}\n`;
        text += `⚠️ الفرق: ${data.diff}\n`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function printSingle(d) { printThermal(d, false); }

    function printThermal(d, isAgg) {
        const area = document.getElementById("thermalArea");
        const title = isAgg ? `تجميع: ${Array.from(d.branchNames).join(", ")}` : `فرع: ${d.branchName}`;
        
        area.innerHTML = `
            <img src="${logoUrl}" class="header-logo">
            <div class="header-branch">${title}</div>
            <div style="text-align:center; font-weight:bold; font-size:13px; margin-bottom:10px;">
                ${isAgg ? '--- تقرير يومي مجمع ---' : `رقم الدرج: #${d.drawer}`} <br> التاريخ: ${d.date}
            </div>

            <table class="receipt-table" style="font-size:16px;">
                <tr style="background:#eee"><th>البيان</th><th>القيمة</th></tr>
                <tr><td>إجمالي النقدي</td><td>${d.cash}</td></tr>
                <tr><td>انستا باي (ع:${countOperations(d.insta)})</td><td>${sum(d.insta)}</td></tr>
                <tr><td>محافظ (ع:${countOperations(d.wallet)})</td><td>${sum(d.wallet)}</td></tr>
                <tr><td>فيزا مبيعات (ع:${countOperations(d.visa, true)})</td><td>${sum(d.visa)}</td></tr>
                <tr style="background:#f0f0f0; font-size:20px;"><td>المبلغ الفعلي</td><td>${d.actual}</td></tr>
                <tr style="font-size:1
