<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير تسليم الخزينة</title>
<style>
body{font-family:Tahoma;background:#eef2f7;margin:0;padding:0;text-align:center;}
.container{max-width:1400px;margin:auto;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;text-align:center;}
select,input{padding:6px;margin:2px;text-align:center;font-size:14px;}
button{padding:6px 10px;margin:2px;font-size:14px;cursor:pointer;}

table{width:100%;border-collapse:collapse;margin-top:5px;}
th,td{text-align:center;padding:4px;font-size:14px;border:1px solid #000;}

.summaryBox{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.summaryItem{background:#2c3e50;color:#fff;padding:10px;border-radius:8px;min-width:120px}

.printBtn{background:#e67e22;color:#fff;border:none;padding:10px;margin-top:10px;width:100%;cursor:pointer;font-size:16px;}

.diffPositive{color:green;font-weight:bold;}
.diffNegative{color:red;font-weight:bold;}

.detailsTable th, .detailsTable td{text-align:center;padding:4px;border:1px solid #000;font-size:13px;}
.infoTable th, .infoTable td{text-align:center;padding:3px;border:1px solid #000;font-size:14px;}

.footerBox{display:flex;justify-content:center;gap:20px;margin-top:10px;font-weight:bold;font-size:14px;}

.logo{width:80px;display:block;margin:auto;margin-bottom:5px;}
</style>
</head>
<body>
<div class="container">

<h3>📊 تقرير تسليم الخزينة</h3>

<div class="card">
<select id="branchSelect"></select>
<input type="date" id="dateSelect">
<input type="number" id="drawerSearch" placeholder="رقم الدرج">
<button onclick="loadTreasury()">عرض</button>
</div>

<div class="card summaryBox" id="summary"></div>

<!-- التقرير كما هو بدون أي تعديل -->
<div class="card">
<table>
<thead>
<tr>
<th>الدرج</th><th>التاريخ</th><th>اليوم</th><th>الفرع</th><th>الإجمالي</th>
</tr>
</thead>
<tbody id="treasuryTable"></tbody>
</table>
</div>

<!-- تفاصيل الرسيت -->
<div id="detailsContainer" class="card" style="display:none;">
<div id="details"></div>
<button class="printBtn" onclick="printReceipt()">🖨 طباعة الرسيت</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig={databaseURL:"https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let current=null;
const sum=(arr)=> (arr||[]).reduce((a,b)=>a+Number(b.amount||0),0);

// تحميل الفروع
db.ref("branches").once("value").then(snap=>{
branchSelect.innerHTML=`<option value="">كل الفروع</option>`;
snap.forEach(b=>{
let data=b.val();
branchSelect.innerHTML+=`<option value="${b.key}" data-name="${data.name}" data-logo="${data.logo || 'https://lh3.googleusercontent.com/pw/AP1GczMmWcnkdN5X7Nj-T43iWXvYyNhrirKQUTagxX1MJmzD5N-aqmT4rYu5ESgMSpxbOZT5b_c61iTF2eU2pYkhlBFrz7lpqYWh0Nm7VEQlpHCXJ0MJVLFjUA0j5gWaaIgprthGb8NmlZL_hpWFzZTdUFAl=w2499-h2499-s-no-gm?authuser=0'}">${data.name}</option>`;
});
});

branchSelect.onchange = loadTreasury;
dateSelect.onchange = loadTreasury;
drawerSearch.oninput = loadTreasury;

function loadTreasury(){
treasuryTable.innerHTML="";
summary.innerHTML="";
let totalCash=0,totalInsta=0,totalWallet=0,totalVisa=0;
let countInsta=0,countWallet=0,countVisa=0;
let grandTotal=0;

const selectedBranchText = branchSelect.selectedOptions[0]?.text;
const selectedDate = dateSelect.value;
const drawerValue = drawerSearch.value;

db.ref("treasury").once("value").then(snap=>{
snap.forEach(s=>{
let t=s.val();
if(branchSelect.value && t.branchName != selectedBranchText) return;
if(selectedDate && t.date != selectedDate) return;
if(drawerValue && t.drawer != drawerValue) return;

totalCash += Number(t.cash||0);
totalInsta += sum(t.insta);
totalWallet += sum(t.wallet);
totalVisa += sum(t.visa);
countInsta += (t.insta||[]).length;
countWallet += (t.wallet||[]).length;
countVisa += (t.visa||[]).length;
grandTotal += Number(t.total||0);

let tr=document.createElement("tr");
tr.innerHTML=`<td>${t.drawer}</td><td>${t.date}</td><td>${t.day}</td><td>${t.branchName}</td><td>${t.total}</td>`;
tr.onclick=()=>{current=t;showDetails(t);};
treasuryTable.appendChild(tr);
});
if(treasuryTable.innerHTML===""){treasuryTable.innerHTML=`<tr><td colspan="5">لا توجد بيانات</td></tr>`;}
summary.innerHTML=`
<div class="summaryItem">نقدي<br>${totalCash}</div>
<div class="summaryItem">انستا<br>${totalInsta}<br>(${countInsta})</div>
<div class="summaryItem">محفظة<br>${totalWallet}<br>(${countWallet})</div>
<div class="summaryItem">فيزا<br>${totalVisa}<br>(${countVisa})</div>
<div class="summaryItem">الإجمالي<br>${grandTotal}</div>
`;
});
}

function showDetails(t){
detailsContainer.style.display="block";
let logo = branchSelect.selectedOptions[0]?.getAttribute("data-logo") || 'https://lh3.googleusercontent.com/pw/AP1GczMmWcnkdN5X7Nj-T43iWXvYyNhrirKQUTagxX1MJmzD5N-aqmT4rYu5ESgMSpxbOZT5b_c61iTF2eU2pYkhlBFrz7lpqYWh0Nm7VEQlpHCXJ0MJVLFjUA0j5gWaaIgprthGb8NmlZL_hpWFzZTdUFAl=w2499-h2499-s-no-gm?authuser=0';

function tableHtml(title, arr, type){
if(!arr||arr.length==0) return "";
let h=`<h4>${title}</h4><table class="detailsTable"><tr>`;
if(type=="insta"||type=="wallet"){h+=`<th>المبلغ</th><th>الرقم</th><th>الاسم</th>`;}
if(type=="visa"){h+=`<th>المبلغ</th><th>الترحيلة</th>`;}
if(type=="exp"){h+=`<th>المبلغ</th><th>السبب</th><th>المسؤول</th>`;}
h+=`</tr>`;arr.forEach(i=>{h+=`<tr>`;if(type=="insta"||type=="wallet"){h+=`<td>${i.amount}</td><td>${i.mobile||""}</td><td>${i.name||""}</td>`;}if(type=="visa"){h+=`<td>${i.amount}</td><td>${i.ref||""}</td>`;}if(type=="exp"){h+=`<td>${i.amount}</td><td>${i.note||""}</td><td>${i.user||i.employee||""}</td>`;}h+=`</tr>`;});h+=`</table><b>الإجمالي: ${sum(arr)}</b><br>`;return h;
}

let diffClass=t.diff<0?"diffNegative":"diffPositive";

let html=`
<div style="display:flex;justify-content:center;">
<div style="border:1px solid #000; padding:10px; width:auto; max-width:95%;">
<div class="headerBox">
<img src="${logo}" class="logo">
<div class="branchName">فرع: ${t.branchName}</div>
</div>

<table class="infoTable">
<tr><th>اليوم</th><th>التاريخ</th><th>رقم الدرج</th></tr>
<tr><td>${t.day}</td><td>${t.date}</td><td>${t.drawer}</td></tr>
</table>

<table class="detailsTable">
<tr><th>الحركة</th><th>القيمة</th></tr>
<tr><td>نقدي</td><td>${t.cash||0}</td></tr>
<tr><td>انستا</td><td>${sum(t.insta)}</td></tr>
<tr><td>محفظة</td><td>${sum(t.wallet)}</td></tr>
<tr><td>فيزا</td><td>${sum(t.visa)}</td></tr>
<tr><td>فعلي</td><td>${t.actual||0}</td></tr>
<tr><td>الإجمالي</td><td>${t.total||0}</td></tr>
<tr><td>الفرق</td><td class="${diffClass}">${t.diff||0}</td></tr>
</table>

${tableHtml("انستا",t.insta,"insta")}
${tableHtml("محفظة",t.wallet,"wallet")}
${tableHtml("فيزا",t.visa,"visa")}
${tableHtml("مشتريات",t.purchases,"exp")}
${tableHtml("مصروفات",t.expenses,"exp")}

<div class="footerBox"><div>المسؤول: ${t.drawerManager||""}</div><div>المراجع: ${t.reviewer||""}</div></div>

</div>
</div>
`;

details.innerHTML=html;
}

function printReceipt(){
if(!current){alert("اختر شفت");return;}
let content=document.getElementById("details").innerHTML;
let w=window.open("","width=400,height=600");
w.document.write(`<html dir="rtl"><head><title>طباعة الرسيت</title>
<style>
body{font-family:Tahoma;width:80mm;margin:0;padding:5px;text-align:center;font-size:13px;}
table{width:100%;border-collapse:collapse;}
th,td{text-align:center;border:1px solid #000;padding:4px;}
.logo{width:80px;display:block;margin:auto;margin-bottom:5px;}
.footerBox{display:flex;justify-content:center;gap:20px;margin-top:10px;font-weight:bold;font-size:14px;}
</style></head><body>${content}</body></html>`);
w.document.close();
setTimeout(()=>{w.print();},500);
}
</script>
</body>
</html>
