<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الخزينة v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        
        /* إعدادات الطباعة الحرارية المخصصة */
        #thermalArea {
            display: none;
            width: 80mm;
            background: white;
            padding: 0;
            margin: 0;
            color: black;
        }

        .receipt-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            border: 1.5px solid #000;
        }
        .receipt-table th, .receipt-table td {
            border: 1.5px solid #000;
            padding: 5px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        .header-branch {
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 10px;
            border-bottom: 3px solid #000;
            padding-bottom: 5px;
        }
        .big-val { font-size: 20px; font-weight: 900; }
        
        .footer-signatures {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            border-top: 1.5px solid #000;
            padding-top: 10px;
            font-weight: bold;
            font-size: 13px;
        }

        @media print {
            @page { size: 80mm auto; margin: 0; }
            body * { visibility: hidden; }
            #thermalArea, #thermalArea * { visibility: visible; }
            #thermalArea {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                padding: 4mm; /* مساحة جانبية للطباعة */
            }
            .no-print { display: none !important; }
        }

        .card-stat { @apply bg-white p-5 rounded-2xl shadow-sm border-r-4 transition-all hover:shadow-md; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto no-print">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800">داشبورد مراجعة الفروع</h1>
                <p class="text-slate-500 font-bold">تتبع المبيعات والطباعة الحرارية 80mm</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg transition-all">
                🔄 تحديث البيانات
            </button>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="card-stat border-blue-500">
                <span class="text-slate-400 text-xs font-black uppercase">إجمالي الكاش</span>
                <h2 id="stCash" class="text-2xl font-black text-slate-800 mt-1">0</h2>
            </div>
            <div class="card-stat border-emerald-500">
                <span class="text-slate-400 text-xs font-black uppercase">انستا باي</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stInsta" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="ctInsta" class="text-emerald-600 text-sm font-black">0 op</span>
                </div>
            </div>
            <div class="card-stat border-purple-500">
                <span class="text-slate-400 text-xs font-black uppercase">المحافظ</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stWallet" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="ctWallet" class="text-purple-600 text-sm font-black">0 op</span>
                </div>
            </div>
            <div class="card-stat border-orange-500">
                <span class="text-slate-400 text-xs font-black uppercase">الفيزا</span>
                <div class="flex justify-between items-center mt-1">
                    <h2 id="stVisa" class="text-2xl font-black text-slate-800">0</h2>
                    <span id="ctVisa" class="text-orange-600 text-sm font-black">0 op</span>
                </div>
            </div>
        </div>

        <!-- شريط البحث المطول -->
        <div class="bg-white p-5 rounded-2xl shadow-sm mb-8 border border-slate-100 flex flex-wrap gap-3 items-end">
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-black text-slate-500 mb-1">الفرع</label>
                <select id="fBranch" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl outline-none font-bold focus:border-blue-500">
                    <option value="">جميع الفروع</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-xs font-black text-slate-500 mb-1">التاريخ</label>
                <input type="date" id="fDate" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl outline-none font-bold focus:border-blue-500">
            </div>
            <div class="flex-1 min-w-[120px]">
                <label class="block text-xs font-black text-slate-500 mb-1">رقم الدرج</label>
                <input type="number" id="fDrawer" placeholder="رقم الدرج" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl outline-none font-bold focus:border-blue-500">
            </div>
            <button onclick="fetchData()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-black hover:bg-black transition-all">تصفية</button>
            <button onclick="clearFilters()" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all text-sm">مسح</button>
        </div>

        <!-- جدول النتائج -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
            <table class="w-full text-right">
                <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                    <tr>
                        <th class="p-4">الدرج</th>
                        <th class="p-4">الفرع</th>
                        <th class="p-4">التاريخ</th>
                        <th class="p-4">الفعلي</th>
                        <th class="p-4">الفرق</th>
                        <th class="p-4 text-center">الإجراء</th>
                    </tr>
                </thead>
                <tbody id="mainList" class="divide-y divide-slate-50 font-bold text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <!-- منطقة الطباعة -->
    <div id="thermalArea"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://sample-firebase-ai-app-e4260-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = () => { loadBranches(); fetchData(); };

    function loadBranches() {
        db.ref("branches").once("value", s => {
            const sel = document.getElementById("fBranch");
            s.forEach(c => sel.innerHTML += `<option value="${c.key}">${c.val().name}</option>`);
        });
    }

    function clearFilters() {
        document.getElementById("fBranch").value = "";
        document.getElementById("fDate").value = "";
        document.getElementById("fDrawer").value = "";
        fetchData();
    }

    function sum(a) { return a ? a.reduce((s, x) => s + (parseFloat(x.amount) || 0), 0) : 0; }
    function countOps(a, t) { 
        if(!a) return 0;
        return t === 'v' ? a.reduce((s, x) => s + (parseInt(x.count) || 0), 0) : a.length;
    }

    function fetchData() {
        const list = document.getElementById("mainList");
        const b = document.getElementById("fBranch").value;
        const d = document.getElementById("fDate").value;
        const dr = document.getElementById("fDrawer").value;

        list.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-slate-300">جاري التحميل...</td></tr>`;

        db.ref("treasury").once("value", s => {
            list.innerHTML = "";
            let records = [];
            s.forEach(c => {
                const item = c.val();
                if (b && item.branchKey !== b) return;
                if (d && item.date !== d) return;
                if (dr && item.drawer != dr) return;
                records.push(item);
            });

            records.sort((x, y) => y.timestamp - x.timestamp);

            let tC=0, tI=0, cI=0, tW=0, cW=0, tV=0, cV=0;
            records.forEach(item => {
                const iS=sum(item.insta), iC=countOps(item.insta), wS=sum(item.wallet), wC=countOps(item.wallet), vS=sum(item.visa), vC=countOps(item.visa,'v');
                tC += (+item.cash||0); tI += iS; cI += iC; tW += wS; cW += wC; tV += vS; cV += vC;

                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4">#${item.drawer}</td>
                    <td class="p-4 text-slate-500">${item.branchName}</td>
                    <td class="p-4 text-xs text-slate-400">${item.date}</td>
                    <td class="p-4 text-blue-600">${item.actual}</td>
                    <td class="p-4 ${+item.diff < 0 ? 'text-red-500' : 'text-green-500'}">${item.diff}</td>
                    <td class="p-4 text-center">
                        <button onclick='printReport(${JSON.stringify(item)})' class="bg-slate-800 text-white px-4 py-1.5 rounded-lg text-xs font-black">طباعة</button>
                    </td>
                `;
                list.appendChild(tr);
            });

            document.getElementById("stCash").innerText = tC.toLocaleString();
            document.getElementById("stInsta").innerText = tI.toLocaleString();
            document.getElementById("ctInsta").innerText = cI + " op";
            document.getElementById("stWallet").innerText = tW.toLocaleString();
            document.getElementById("ctWallet").innerText = wC + " op";
            document.getElementById("stVisa").innerText = tV.toLocaleString();
            document.getElementById("ctVisa").innerText = vC + " op";
        });
    }

    function subTable(title, arr, mode) {
        if(!arr || arr.length === 0) return "";
        let h = `<div style="text-align:center; font-weight:900; margin-top:12px; border-top:1.2px dashed #000; padding-top:4px;">-- ${title} --</div>`;
        h += `<table class="receipt-table"><thead><tr>`;
        if(mode==='v') h += `<th>باتش</th><th>قيمة</th><th>ع</th>`;
        else if(mode==='t') h += `<th>قيمة</th><th>رقم</th><th>اسم</th>`;
        else h += `<th>قيمة</th><th>بيان</th><th>مسؤول</th>`;
        h += `</tr></thead><tbody>`;
        arr.forEach(x => {
            h += `<tr>`;
            if(mode==='v') h += `<td>${x.batch}</td><td>${x.amount}</td><td>${x.count}</td>`;
            else if(mode==='t') h += `<td>${x.amount}</td><td>${x.mobile}</td><td>${x.name}</td>`;
            else h += `<td>${x.amount}</td><td>${x.note}</td><td>${x.user}</td>`;
            h += `</tr>`;
        });
        h += `<tr style="background:#eee"><td colspan="${mode==='v'||mode==='t'?'2':'1'}">إجمالي ${title}</td><td>${sum(arr)}</td></tr></tbody></table>`;
        return h;
    }

    window.printReport = function(d) {
        const area = document.getElementById("thermalArea");
        area.innerHTML = `
            <div class="header-branch">فرع: ${d.branchName}</div>
            
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; margin-bottom:5px;">
                <span>التاريخ: ${d.date}</span>
                <span>اليوم: ${d.day}</span>
            </div>
            <div style="font-weight:bold; font-size:14px; margin-bottom:10px;">رقم الدرج: #${d.drawer}</div>

            <table class="receipt-table" style="font-size:17px;">
                <tr style="background:#eee"><th>البيان</th><th>القيمة</th></tr>
                <tr><td>نقدي (كاش)</td><td>${d.cash}</td></tr>
                <tr><td>انستا باي</td><td>${sum(d.insta)}</td></tr>
                <tr><td>محافظ إلكترونية</td><td>${sum(d.wallet)}</td></tr>
                <tr><td>فيزا مبيعات</td><td>${sum(d.visa)}</td></tr>
                <tr class="big-val" style="background:#f0f0f0"><td>المبلغ الفعلي</td><td>${d.actual}</td></tr>
                <tr class="big-val"><td>إجمالي الحساب</td><td>${d.total}</td></tr>
                <tr class="big-val" style="color:${+d.diff < 0 ? 'red' : 'green'}"><td>الفرق</td><td>${d.diff}</td></tr>
            </table>

            ${subTable("الفيزا والباتشات", d.visa, 'v')}
            ${subTable("انستا باي", d.insta, 't')}
            ${subTable("المحافظ الذكية", d.wallet, 't')}
            ${subTable("المشتريات", d.purchases, 'e')}
            ${subTable("المصروفات", d.expenses, 'e')}

            <div class="footer-signatures">
                <div>توقيع المسؤول: ${d.drawerManager}</div>
                <div>توقيع المراجع: ${d.reviewer}</div>
            </div>

            <div style="text-align:center; font-size:10px; margin-top:20px; border-top:1px solid #ddd; padding-top:5px;">
                تمت الطباعة في: ${new Date().toLocaleString('ar-EG')}
            </div>
        `;
        window.print();
    }
</script>
</body>
</html>
